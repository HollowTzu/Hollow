name: AI Market Analysis Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-ai-update:
    runs-on: ubuntu-latest

    steps:
      # Updated to v4.2.2 to resolve Node 20 deprecation
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      # Updated to v5.3.0 to resolve Node 20 deprecation
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai pydantic beautifulsoup4

      - name: Run AI Dashboard Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python ai_dashboard.py

      - name: Commit and Push Updated index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update market analysis via AI [skip ci]" && git push)
