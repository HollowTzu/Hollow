name: Daily Market Desk Update

on:
  schedule:
    # Runs automatically every weekday at 6:00 AM ET (10:00 UTC)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI anytime

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install beautifulsoup4

      - name: Run Dashboard Update Script
        run: python update_dashboard.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add "index.html"
          git commit -m "Auto-update Global Market Dashboard daily bias" || exit 0
          git push
